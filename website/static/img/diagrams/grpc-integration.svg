<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" fill="none">
  <style>
    text { font-family: 'Inter', 'Geist', system-ui, sans-serif; }
    .title { font-size: 12px; fill: #09090b; font-weight: 600; }
    .label { font-size: 10px; fill: #71717a; font-weight: 500; }
    .mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; font-size: 9px; fill: #52525b; }
    .file { font-family: 'Geist Mono', monospace; font-size: 8px; fill: #a1a1aa; }
    .box { stroke: #e4e4e7; stroke-width: 1; rx: 8; fill: white; }
    .box-accent { stroke: #d4d4d8; stroke-width: 1; rx: 6; fill: #fafafa; }
    .boundary { stroke: #e4e4e7; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .arrow { stroke: #a1a1aa; stroke-width: 1.2; marker-end: url(#grpc-arr); }
    .boundary-label { font-size: 8px; fill: #a1a1aa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #fafafa; } .label { fill: #a1a1aa; } .mono { fill: #a1a1aa; } .file { fill: #71717a; }
      .box { stroke: #27272a; fill: #18181b; } .box-accent { stroke: #3f3f46; fill: #27272a; }
      .boundary { stroke: #27272a; }
      .arrow { stroke: #52525b; } .boundary-label { fill: #71717a; }
    }
  </style>
  <defs>
    <marker id="grpc-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#a1a1aa" stroke-width="1"/></marker>
  </defs>

  <!-- React Hooks -->
  <rect x="15" y="35" width="140" height="150" class="box"/>
  <text x="85" y="58" text-anchor="middle" class="title">React Hooks</text>
  <rect x="27" y="70" width="116" height="22" class="box-accent"/><text x="85" y="86" text-anchor="middle" class="mono">useJob</text>
  <rect x="27" y="100" width="116" height="22" class="box-accent"/><text x="85" y="116" text-anchor="middle" class="mono">useValidation</text>
  <rect x="27" y="130" width="116" height="22" class="box-accent"/><text x="85" y="146" text-anchor="middle" class="mono">useExplain</text>

  <!-- Arrow -->
  <line x1="155" y1="110" x2="178" y2="110" class="arrow"/>

  <!-- teckel-client.ts -->
  <rect x="180" y="50" width="145" height="120" class="box"/>
  <text x="252" y="73" text-anchor="middle" class="title">teckel-client.ts</text>
  <text x="252" y="90" text-anchor="middle" class="file">src/lib/api/teckel-client.ts</text>
  <rect x="192" y="100" width="121" height="22" class="box-accent"/><text x="252" y="116" text-anchor="middle" class="mono">typed RPC wrapper</text>
  <rect x="192" y="130" width="121" height="22" class="box-accent"/><text x="252" y="146" text-anchor="middle" class="mono">createTeckelClient</text>

  <!-- Arrow -->
  <line x1="325" y1="110" x2="348" y2="110" class="arrow"/>

  <!-- ConnectRPC -->
  <rect x="350" y="40" width="155" height="140" class="box"/>
  <text x="427" y="63" text-anchor="middle" class="title">ConnectRPC</text>
  <rect x="362" y="78" width="131" height="22" class="box-accent"/><text x="427" y="94" text-anchor="middle" class="mono">gRPC-Web transport</text>
  <rect x="362" y="108" width="131" height="22" class="box-accent"/><text x="427" y="124" text-anchor="middle" class="mono">protobuf encoding</text>
  <rect x="362" y="138" width="131" height="22" class="box-accent"/><text x="427" y="154" text-anchor="middle" class="mono">@connectrpc/connect</text>

  <!-- Arrow to boundary -->
  <line x1="505" y1="110" x2="545" y2="110" class="arrow"/>

  <!-- Network boundary -->
  <line x1="555" y1="15" x2="555" y2="205" class="boundary"/>
  <text x="555" y="215" text-anchor="middle" class="boundary-label">Network Boundary</text>

  <!-- Arrow from boundary -->
  <line x1="565" y1="110" x2="598" y2="110" class="arrow"/>

  <!-- tonic-web -->
  <rect x="600" y="50" width="130" height="120" class="box"/>
  <text x="665" y="73" text-anchor="middle" class="title">tonic-web</text>
  <rect x="612" y="88" width="106" height="22" class="box-accent"/><text x="665" y="104" text-anchor="middle" class="mono">gRPC-Web</text>
  <text x="665" y="120" text-anchor="middle" class="mono">&darr;</text>
  <rect x="612" y="128" width="106" height="22" class="box-accent"/><text x="665" y="144" text-anchor="middle" class="mono">gRPC bridge</text>

  <!-- Arrow -->
  <line x1="730" y1="110" x2="753" y2="110" class="arrow"/>

  <!-- teckel-worker -->
  <rect x="755" y="30" width="130" height="160" class="box"/>
  <text x="820" y="53" text-anchor="middle" class="title">teckel-worker</text>
  <text x="820" y="68" text-anchor="middle" class="file">TeckelService</text>
  <rect x="767" y="78" width="106" height="22" class="box-accent"/><text x="820" y="94" text-anchor="middle" class="mono">Validate</text>
  <rect x="767" y="108" width="106" height="22" class="box-accent"/><text x="820" y="124" text-anchor="middle" class="mono">Execute</text>
  <rect x="767" y="138" width="106" height="22" class="box-accent"/><text x="820" y="154" text-anchor="middle" class="mono">Jobs / Health</text>
</svg>

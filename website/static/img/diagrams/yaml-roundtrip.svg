<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" fill="none">
  <style>
    text { font-family: 'Inter', 'Geist', system-ui, sans-serif; }
    .title { font-size: 13px; fill: #09090b; font-weight: 600; }
    .label { font-size: 10px; fill: #71717a; font-weight: 500; }
    .mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; font-size: 9.5px; fill: #52525b; }
    .file { font-family: 'Geist Mono', monospace; font-size: 8px; fill: #a1a1aa; }
    .box { stroke: #e4e4e7; stroke-width: 1; rx: 8; fill: white; }
    .box-accent { stroke: #d4d4d8; stroke-width: 1; rx: 6; fill: #fafafa; }
    .arrow-r { stroke: #09090b; stroke-width: 1.2; marker-end: url(#yr-arr); }
    .arrow-l { stroke: #09090b; stroke-width: 1.2; marker-end: url(#yr-arr-l); }
    .arrow-validate { stroke: #a1a1aa; stroke-width: 1.2; marker-end: url(#yr-arr-gray); }
    @media (prefers-color-scheme: dark) {
      .title { fill: #fafafa; } .label { fill: #a1a1aa; } .mono { fill: #a1a1aa; } .file { fill: #71717a; }
      .box { stroke: #27272a; fill: #18181b; } .box-accent { stroke: #3f3f46; fill: #27272a; }
      .arrow-r { stroke: #fafafa; } .arrow-l { stroke: #fafafa; } .arrow-validate { stroke: #52525b; }
    }
  </style>
  <defs>
    <marker id="yr-arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#09090b" stroke-width="1"/></marker>
    <marker id="yr-arr-l" markerWidth="7" markerHeight="5" refX="1" refY="2.5" orient="auto"><path d="M7,0 L0,2.5 L7,5" fill="none" stroke="#09090b" stroke-width="1"/></marker>
    <marker id="yr-arr-gray" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#a1a1aa" stroke-width="1"/></marker>
  </defs>

  <!-- Visual Canvas (left) -->
  <rect x="15" y="40" width="190" height="180" class="box"/>
  <text x="110" y="65" text-anchor="middle" class="title">Visual Canvas</text>
  <rect x="30" y="80" width="160" height="22" class="box-accent"/><text x="110" y="96" text-anchor="middle" class="mono">Nodes + Edges</text>
  <rect x="30" y="110" width="160" height="22" class="box-accent"/><text x="110" y="126" text-anchor="middle" class="mono">Pipeline metadata</text>
  <rect x="30" y="140" width="160" height="22" class="box-accent"/><text x="110" y="156" text-anchor="middle" class="mono">Variables + Secrets</text>
  <rect x="30" y="170" width="160" height="22" class="box-accent"/><text x="110" y="186" text-anchor="middle" class="mono">Extra sections</text>

  <!-- Bidirectional arrows -->
  <line x1="205" y1="108" x2="318" y2="108" class="arrow-r"/>
  <text x="262" y="100" text-anchor="middle" class="file">generator.ts</text>

  <line x1="318" y1="152" x2="205" y2="152" class="arrow-l"/>
  <text x="262" y="170" text-anchor="middle" class="file">parser.ts</text>

  <!-- YAML Document (center) -->
  <rect x="320" y="40" width="200" height="180" class="box"/>
  <text x="420" y="65" text-anchor="middle" class="title">YAML Document</text>
  <rect x="335" y="80" width="170" height="22" class="box-accent"/><text x="420" y="96" text-anchor="middle" class="mono">version: "3.0"</text>
  <rect x="335" y="110" width="170" height="22" class="box-accent"/><text x="420" y="126" text-anchor="middle" class="mono">input / output</text>
  <rect x="335" y="140" width="170" height="22" class="box-accent"/><text x="420" y="156" text-anchor="middle" class="mono">transformation</text>
  <rect x="335" y="170" width="170" height="22" class="box-accent"/><text x="420" y="186" text-anchor="middle" class="mono">config / secrets / hooks</text>

  <!-- validate arrow -->
  <line x1="520" y1="130" x2="618" y2="130" class="arrow-validate"/>
  <text x="569" y="122" text-anchor="middle" class="file">validate</text>

  <!-- teckel-api (right) -->
  <rect x="620" y="50" width="185" height="160" class="box"/>
  <text x="712" y="75" text-anchor="middle" class="title">teckel-api</text>
  <rect x="635" y="90" width="155" height="22" class="box-accent"/><text x="712" y="106" text-anchor="middle" class="mono">Spec validation</text>
  <rect x="635" y="120" width="155" height="22" class="box-accent"/><text x="712" y="136" text-anchor="middle" class="mono">Execute pipeline</text>
  <rect x="635" y="150" width="155" height="22" class="box-accent"/><text x="712" y="166" text-anchor="middle" class="mono">Explain plan</text>
  <rect x="635" y="180" width="155" height="22" class="box-accent"/><text x="712" y="196" text-anchor="middle" class="mono">Job management</text>
</svg>

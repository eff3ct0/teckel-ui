<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none">
  <style>
    text { font-family: 'Inter', 'Geist', system-ui, sans-serif; }
    .title { font-size: 13px; fill: #09090b; font-weight: 600; }
    .label { font-size: 10px; fill: #71717a; font-weight: 500; }
    .mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; font-size: 10px; fill: #52525b; }
    .fast { font-size: 9px; fill: #15803d; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .slow { font-size: 9px; fill: #0369a1; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .box { stroke: #e4e4e7; stroke-width: 1; rx: 8; fill: white; }
    .box-accent { stroke: #d4d4d8; stroke-width: 1; rx: 6; fill: #fafafa; }
    .box-fast { stroke: #bbf7d0; stroke-width: 1.5; rx: 8; fill: #f0fdf4; }
    .box-slow { stroke: #bae6fd; stroke-width: 1.5; rx: 8; fill: #f0f9ff; }
    .arrow { stroke: #a1a1aa; stroke-width: 1.2; marker-end: url(#vfa); }
    .zone { stroke: #e4e4e7; stroke-width: 1; rx: 10; fill: none; stroke-dasharray: 5 3; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #fafafa; } .label { fill: #a1a1aa; } .mono { fill: #a1a1aa; }
      .fast { fill: #4ade80; } .slow { fill: #38bdf8; }
      .box { stroke: #27272a; fill: #18181b; } .box-accent { stroke: #3f3f46; fill: #27272a; }
      .box-fast { stroke: #166534; fill: #052e16; } .box-slow { stroke: #0c4a6e; fill: #082f49; }
      .arrow { stroke: #52525b; } .zone { stroke: #27272a; }
    }
  </style>
  <defs>
    <marker id="vfa" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#a1a1aa" stroke-width="1"/></marker>
  </defs>

  <!-- User action -->
  <rect x="10" y="90" width="90" height="40" class="box-accent"/>
  <text x="55" y="115" text-anchor="middle" class="title">Edit</text>
  <line x1="100" y1="100" x2="130" y2="65" class="arrow"/>
  <line x1="100" y1="120" x2="130" y2="155" class="arrow"/>

  <!-- Client-side zone -->
  <rect x="125" y="15" width="280" height="100" class="zone"/>
  <text x="265" y="35" text-anchor="middle" class="fast">Instant · Client-Side</text>

  <rect x="140" y="45" width="110" height="28" class="box-fast"/>
  <text x="195" y="64" text-anchor="middle" class="mono">Zod schemas</text>

  <rect x="140" y="78" width="110" height="28" class="box-fast"/>
  <text x="195" y="97" text-anchor="middle" class="mono">AssetRef format</text>

  <rect x="260" y="45" width="130" height="28" class="box-fast"/>
  <text x="325" y="64" text-anchor="middle" class="mono">Cycle detection</text>

  <rect x="260" y="78" width="130" height="28" class="box-fast"/>
  <text x="325" y="97" text-anchor="middle" class="mono">Connectivity check</text>

  <!-- Server-side zone -->
  <rect x="125" y="130" width="280" height="100" class="zone"/>
  <text x="265" y="150" text-anchor="middle" class="slow">Debounced 800ms · Server-Side</text>

  <rect x="140" y="160" width="120" height="28" class="box-slow"/>
  <text x="200" y="179" text-anchor="middle" class="mono">Generate YAML</text>

  <rect x="270" y="160" width="120" height="28" class="box-slow"/>
  <text x="330" y="179" text-anchor="middle" class="mono">ValidatePipeline</text>

  <rect x="140" y="195" width="250" height="28" class="box-slow"/>
  <text x="265" y="214" text-anchor="middle" class="mono">Full spec validation + type checking</text>

  <line x1="260" y1="174" x2="270" y2="174" class="arrow"/>

  <!-- Merge results -->
  <line x1="405" y1="65" x2="450" y2="120" class="arrow"/>
  <line x1="405" y1="190" x2="450" y2="135" class="arrow"/>

  <!-- Result display -->
  <rect x="450" y="100" width="120" height="60" class="box"/>
  <text x="510" y="122" text-anchor="middle" class="title">Error Display</text>
  <text x="510" y="140" text-anchor="middle" class="mono">topbar badge</text>
  <text x="510" y="154" text-anchor="middle" class="mono">node highlights</text>

  <line x1="570" y1="130" x2="610" y2="130" class="arrow"/>

  <rect x="610" y="110" width="100" height="40" class="box-accent"/>
  <text x="660" y="135" text-anchor="middle" class="mono">User fixes issue</text>
</svg>
